name: Dome Keeper Agent Plan

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dome-keeper

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate improvement plan
        run: node scripts/agent-improvement-plan.mjs > agent-improvement-plan.md

      - name: Upload improvement plan
        uses: actions/upload-artifact@v4
        with:
          name: dome-keeper-agent-improvement-plan
          path: dome-keeper/agent-improvement-plan.md
