name: Dome Keeper CI

on:
  pull_request:
    paths:
      - "dome-keeper/**"
      - ".github/workflows/dome-keeper-ci.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "dome-keeper/**"
      - ".github/workflows/dome-keeper-ci.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dome-keeper

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run checks and browser tests
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dome-keeper-playwright-report
          path: dome-keeper/playwright-report
          if-no-files-found: ignore
